name: Build and Release

on:
    push:
        branches: [main, dev]
    workflow_dispatch:

jobs:
    check-flags:
        runs-on: ubuntu-latest
        outputs:
            skip: ${{ steps.flags.outputs.skip }}
            build_macos: ${{ steps.flags.outputs.build_macos }}

        steps:
            - uses: actions/checkout@v4

            - id: flags
              run: |
                  msg=$(git log -1 --pretty=%B)

                  echo "Commit message:"
                  echo "$msg"

                  if echo "$msg" | grep -Ei "\[skip ci\]|skip-ci|skip_ci"; then
                    echo "skip=true" >> $GITHUB_OUTPUT
                  else
                    echo "skip=false" >> $GITHUB_OUTPUT
                  fi

                  if echo "$msg" | grep -Ei "release|build macos"; then
                    echo "build_macos=true" >> $GITHUB_OUTPUT
                  else
                    echo "build_macos=false" >> $GITHUB_OUTPUT
                  fi

    build:
        needs: check-flags
        if: needs.check-flags.outputs.skip != 'true'

        strategy:
            fail-fast: false
            matrix:
                platform: [ubuntu-latest, windows-latest]

        runs-on: ${{ matrix.platform }}

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install frontend dependencies
              run: npm ci

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-latest'
              run: |
                  sudo apt update
                  sudo apt install -y \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libsoup-3.0-dev \
                    libjavascriptcoregtk-4.1-dev \
                    patchelf

            - name: Build Tauri
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-${{ matrix.platform }}
                  path: |
                      src-tauri/target/release/bundle/**/*

    build-macos:
        needs: check-flags
        if: needs.check-flags.outputs.build_macos == 'true'

        runs-on: macos-latest

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Add macOS targets
              run: |
                  rustup target add aarch64-apple-darwin
                  rustup target add x86_64-apple-darwin

            - name: Install frontend dependencies
              run: npm ci

            - name: Build ARM version
              run: |
                  npm run tauri build -- --target aarch64-apple-darwin

            - name: Build Intel version
              run: |
                  npm run tauri build -- --target x86_64-apple-darwin

            - name: Create Universal Binary
              run: |
                  APP_NAME=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app | head -n1 | xargs basename)

                  ARM_BIN="src-tauri/target/aarch64-apple-darwin/release/$APP_NAME/Contents/MacOS/$APP_NAME"
                  INTEL_BIN="src-tauri/target/x86_64-apple-darwin/release/$APP_NAME/Contents/MacOS/$APP_NAME"

                  UNIVERSAL_DIR="src-tauri/target/universal-macos"

                  mkdir -p "$UNIVERSAL_DIR"

                  cp -R src-tauri/target/aarch64-apple-darwin/release/$APP_NAME "$UNIVERSAL_DIR"

                  lipo -create "$ARM_BIN" "$INTEL_BIN" \
                    -output "$UNIVERSAL_DIR/$APP_NAME/Contents/MacOS/$APP_NAME"

            - name: Upload macOS artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-macos
                  path: |
                      src-tauri/target/*/release/bundle/dmg/*.dmg

    create-release:
        needs: [build, build-macos]
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: release-artifacts

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: build-${{ github.sha }}
                  name: Automated Build
                  prerelease: true
                  files: release-artifacts/**/*
