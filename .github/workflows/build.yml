name: Build and Release

on:
    push:
        branches: [main, dev]

    workflow_dispatch:
        inputs:
            skip_verify:
                description: "Skip commit message verification"
                type: boolean
                default: false

            build_macos:
                description: "Force macOS build"
                type: boolean
                default: false

jobs:
    check-flags:
        runs-on: ubuntu-latest

        outputs:
            skip: ${{ steps.flags.outputs.skip }}
            build_macos: ${{ steps.flags.outputs.build_macos }}

        steps:
            - uses: actions/checkout@v4

            - id: flags
              shell: bash
              run: |

                  msg="$(git log -1 --pretty=%B)"

                  echo "Commit message:"
                  echo "$msg"

                  SKIP=false
                  BUILD_MAC=false

                  if [[ "${{ github.event.inputs.skip_verify }}" == "true" ]]; then
                    echo "Manual override: skipping commit verification"
                    SKIP=false
                  else
                    if echo "$msg" | grep -Ei "\[skip ci\]|skip-ci|skip_ci"; then
                      SKIP=true
                    fi
                  fi

                  if echo "$msg" | grep -Ei "release|build macos"; then
                    BUILD_MAC=true
                  fi

                  if [[ "${{ github.event.inputs.build_macos }}" == "true" ]]; then
                    BUILD_MAC=true
                  fi

                  echo "skip=$SKIP" >> $GITHUB_OUTPUT
                  echo "build_macos=$BUILD_MAC" >> $GITHUB_OUTPUT

    build:
        needs: check-flags
        if: needs.check-flags.outputs.skip != 'true'

        strategy:
            fail-fast: false
            matrix:
                platform: [ubuntu-latest, windows-latest]

        runs-on: ${{ matrix.platform }}

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install frontend dependencies
              run: npm ci

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-latest'
              run: |
                  sudo apt update
                  sudo apt install -y \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libsoup-3.0-dev \
                    libjavascriptcoregtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    patchelf

            - name: Build Tauri
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-${{ matrix.platform }}
                  path: src-tauri/target/release/bundle/**/*

    build-macos:
        needs: check-flags
        if: needs.check-flags.outputs.build_macos == 'true'

        runs-on: macos-latest

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Add macOS targets
              run: |
                  rustup target add aarch64-apple-darwin
                  rustup target add x86_64-apple-darwin

            - name: Install frontend dependencies
              run: npm ci

            - name: Build ARM
              run: |
                  npm run tauri build -- --target aarch64-apple-darwin

            - name: Build Intel
              run: |
                  npm run tauri build -- --target x86_64-apple-darwin

            - name: Create Universal Binary
              shell: bash
              run: |
                  set -e

                  ARM_APP=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" | head -n1)
                  INTEL_APP=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app" | head -n1)

                  APP_NAME=$(basename "$ARM_APP" .app)

                  ARM_BIN="$ARM_APP/Contents/MacOS/$APP_NAME"
                  INTEL_BIN="$INTEL_APP/Contents/MacOS/$APP_NAME"

                  echo "ARM binary: $ARM_BIN"
                  echo "Intel binary: $INTEL_BIN"

                  lipo -create "$ARM_BIN" "$INTEL_BIN" -output "$ARM_BIN"

                  echo "Universal binary created"
                  lipo -info "$ARM_BIN"

            - name: Upload macOS artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-macos
                  path: |
                      src-tauri/target/*/release/bundle/dmg/*.dmg

    create-release:
        needs: [build, build-macos]
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: release-artifacts

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: build-${{ github.sha }}
                  name: Automated Build
                  prerelease: true
                  files: release-artifacts/**/*
